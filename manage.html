<h1>Student & Staff Management</h1>

<!-- Form -->

<form id="recordForm">

<input
type="text"
id="name"
placeholder="Name"
required>

<input
type="text"
id="role"
placeholder="Student / Staff"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<button type="submit">
Save
</button>

</form>

<!-- Data Table -->

<table>

<thead>

<tr>
<th>Name</th>
<th>Role</th>
<th>Email</th>
<th>Actions</th>
</tr>

</thead>
